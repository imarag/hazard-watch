<svg viewBox="0 0 220 250" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hazard Watch logo (light)</title>
  <desc>Minimal logo with a circular emblem combining a seismic wave and warning symbol, with Hazard Watch text</desc>

  <g transform="translate(10,10)" fill="none" stroke="#fafaf5" stroke-linecap="round" stroke-linejoin="round">
    <circle stroke-width="3" cx="100" cy="100" r="92"/>

    <path stroke-width="2.5" d="M18,100 Q30,100 36,82 Q42,64 48,100 Q54,136 60,118 Q66,100 72,100 L128,100 Q134,100 140,82 Q146,64 152,100 Q158,136 164,100 L182,100"/>

    <line stroke-width="2" x1="100" y1="22" x2="100" y2="178"/>
    <line stroke-width="2" x1="18" y1="100" x2="182" y2="100" opacity="0.2"/>

    <circle stroke-width="2" cx="100" cy="100" r="6"/>
    <circle cx="100" cy="100" r="3" fill="#fafaf5" stroke="none"/>

    <circle stroke-width="1.5" cx="100" cy="100" r="30" opacity="0.25"/>
    <circle stroke-width="1.5" cx="100" cy="100" r="58" opacity="0.15"/>
  </g>

  <text x="110" y="232" fill="#fafaf5" text-anchor="middle"
        font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" letter-spacing="0.06em">HAZARD WATCH</text>
</svg>
